  dresser:
    yolo_class: null
    aliases:
      awin:
        - "Chests of Drawers"
        - "Chest of Drawers"
        - "Drawers"
        - "Sideboards"
        - "Dressers"
    description: >
      Low drawer-based storage (chest of drawers, sideboard). Tall hanging
      storage is "wardrobe"; open-shelf units are "bookshelf".

  # ---- Storage -------------------------------------------------------------
  bookshelf:
    yolo_class: null
